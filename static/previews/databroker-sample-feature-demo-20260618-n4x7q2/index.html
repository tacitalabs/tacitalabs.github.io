<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>DataBroker Private Feature Demo</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f5ef;
      --text: #1e2423;
      --muted: #5d6967;
      --line: #d8d2c5;
      --accent: #235c56;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(1040px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 32px 0 40px;
    }

    header {
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      line-height: 1.1;
      font-weight: 750;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      max-width: 760px;
    }

    video {
      display: block;
      width: 100%;
      max-height: calc(100vh - 210px);
      background: #0b0f0e;
      border: 1px solid var(--line);
    }

    .download {
      display: inline-block;
      margin-top: 16px;
      color: var(--accent);
      font-weight: 650;
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.18em;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>DataBroker private feature demo</h1>
      <p>This unlinked demo uses sample data and is intended only for trusted preview sharing.</p>
    </header>

    <video controls preload="metadata" playsinline>
      <source src="databroker-private-feature-demo.mp4" type="video/mp4">
      Your browser does not support HTML5 video.
    </video>

    <a class="download" href="databroker-private-feature-demo.mp4">Download MP4</a>
  </main>
</body>
</html>
