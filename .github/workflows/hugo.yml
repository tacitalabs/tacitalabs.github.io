# Build the Hugo site and publish the generated files to the gh-pages branch.
#
# Trigger:
# - on every push to `main`
# - manually via the Actions tab
#
# Before this works the first time:
# 1. In repo Settings -> Pages, set "Build and deployment" Source to "Deploy from a branch".
# 2. Set the branch to `gh-pages` and folder to `/`.
# 3. Make sure HUGO_VERSION below matches the Hugo version you build with locally.
# 4. Commit hugo.toml, content/, layouts/, static/ from this branch.

name: Deploy Hugo site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions needed to push the generated gh-pages branch.
permissions:
  contents: write

# Cancel in-progress publishes if a new one starts. Keeps the deploy queue clean.
concurrency:
  group: pages
  cancel-in-progress: true

# Pin Hugo here. Bump when you upgrade locally.
env:
  HUGO_VERSION: 0.155.3

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Run URLStrip web cleaner tests
        run: node tests/urlstrip-web-cleaner.test.js

      - name: Build with Hugo
        env:
          # `--minify` shrinks the output. `--gc` cleans up cache.
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "https://www.tacitalabs.com/"

      - name: Publish gh-pages branch
        run: |
          set -euo pipefail
          publish_dir="$(mktemp -d)"
          cp -R public/. "$publish_dir"/
          touch "$publish_dir/.nojekyll"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R "$publish_dir"/. .
          git add -A
          git commit -m "Publish site"
          git push --force origin gh-pages
